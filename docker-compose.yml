services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [appnet]

  api:
    build: ./api
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on: [redis]
    restart: unless-stopped
    networks: [appnet]

  worker:
    build: ./worker
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on: [redis]
    restart: unless-stopped
    networks: [appnet]

  web:
    image: nginx:1.27-alpine
    ports: ["8088:80"]
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [api]
    restart: unless-stopped
    networks: [appnet]

networks:
  appnet:
